<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu MD</title>
</head>
<body>
  <h1>Seu MD é:</h1>
  <p id="md">Carregando...</p>

  <script>
    async function mostrarMD() {
      try {
        const resposta = await fetch('https://api.ipify.org?format=json');
        const dados = await resposta.json();
        // Remove todos os pontos do IP
        const mds = dados.ip.replace(/\./g, "");
        document.getElementById('md').textContent = mds;
      } catch (erro) {
        document.getElementById('md').textContent = "Erro ao obter md";
      }
    }
    mostrarMD();
  </script>
</body>
</html>
